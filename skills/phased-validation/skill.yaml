name: phased-validation
description: 面向长任务的分阶段执行与验收，适合需要中间产物和最终汇总的任务。
inputs:
  goal:
    description: 长任务的总体目标。
    required: true
    prompt: 请输入长任务目标
  phasePlan:
    description: 阶段划分方式和每阶段验收点。
    required: true
    prompt: 请输入阶段计划
  finalArtifact:
    description: 最终交付物位置或格式。
    required: true
    prompt: 请输入最终交付要求
defaultWorkdir: .
defaultModel: gpt-5
outputContract: 逐阶段推进任务，并在最终给出完整验收报告。
