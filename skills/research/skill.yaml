name: research
description: 针对一个主题执行通用资料搜集、交叉核对和结论整理。
inputs:
  topic:
    description: 需要研究的主题或问题。
    required: true
    prompt: 请输入 research 的主题
  constraints:
    description: 对研究范围、来源或输出格式的约束。
    required: false
    default: 无额外约束
    prompt: 请输入额外约束
defaultWorkdir: .
defaultModel: gpt-5
outputContract: 产出一份包含结论、证据和剩余风险的研究结果。
